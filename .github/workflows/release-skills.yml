name: Release Skills

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package each skill as zip
        run: |
          mkdir -p dist
          for dir in .claude/skills/*/; do
            skill_name=$(basename "$dir")
            echo "Packaging: $skill_name"
            (cd "$dir" && zip -r "../../../dist/${skill_name}.zip" .)
          done
          ls -la dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          TAG="v0.0.0-${SHA_SHORT}"
          TITLE="Skills Release ${SHA_SHORT}"

          # Build release notes
          NOTES="## Skills in this release\n\n"
          for zip in dist/*.zip; do
            name=$(basename "$zip" .zip)
            size=$(du -h "$zip" | cut -f1)
            NOTES="${NOTES}- **${name}** (${size})\n"
          done
          NOTES="${NOTES}\n---\nCommit: ${GITHUB_SHA}"

          gh release create "$TAG" dist/*.zip \
            --title "$TITLE" \
            --notes "$(echo -e "$NOTES")" \
            --latest
